---
# ClusterSecretStore using the Bitwarden CLI sidecar as a webhook backend.
# This works with the bitwarden-cli.yaml Deployment which exposes a REST API
# on port 8087. The webhook provider calls the CLI's /object endpoint to
# retrieve secrets by their Bitwarden item ID.
#
# For each ExternalSecret, the remoteRef.key should be a Bitwarden item UUID.
# The remoteRef.property should be the field name on the item (e.g. "password").
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: bitwarden-secret-store
spec:
  provider:
    webhook:
      url: "http://bitwarden-cli.external-secrets.svc.cluster.local:8087/object/item/{{ .remoteRef.key }}"
      headers:
        Content-Type: application/json
      result:
        jsonPath: "$.data.fields[?(@.name==\"{{ .remoteRef.property }}\")].value"
      auth: {}
