---
apiVersion: v1
kind: Namespace
metadata:
  name: sonarqube
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: sonarqube
  namespace: flux-system
spec:
  interval: 24h
  url: https://SonarSource.github.io/helm-chart-sonarqube
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarqube
  namespace: sonarqube
spec:
  interval: 30m
  chart:
    spec:
      chart: sonarqube
      version: "10.x"
      sourceRef:
        kind: HelmRepository
        name: sonarqube
        namespace: flux-system
      interval: 12h
  values:
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - host: sonar.local.example.com
          paths:
            - path: /
              pathType: Prefix
    # Add your values here
    # See chart documentation for available values
