---
apiVersion: v1
kind: Namespace
metadata:
  name: capacitor
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: gimlet
  namespace: flux-system
spec:
  interval: 24h
  url: https://gimlet-io.github.io/capacitor
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: capacitor
  namespace: capacitor
spec:
  interval: 30m
  chart:
    spec:
      chart: capacitor
      version: "0.x"
      sourceRef:
        kind: HelmRepository
        name: gimlet
        namespace: flux-system
      interval: 12h
  values:
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - host: capacitor.local.example.com
          paths:
            - path: /
              pathType: Prefix
    # Add your values here
    # See chart documentation for available values
