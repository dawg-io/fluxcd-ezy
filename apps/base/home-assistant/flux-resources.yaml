---
apiVersion: v1
kind: Namespace
metadata:
  name: home-assistant
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: home-assistant-kustomize
  namespace: flux-system
spec:
  interval: 1h
  url: https://github.com/dawg-io/home-assistant-kustomize
  ref:
    semver: ">=0.0.0"  # home-assistant-kustomize uses git tags matching app release versions (e.g. 2026.3.2)
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: home-assistant
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: home-assistant-kustomize
  path: "./"
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: infrastructure-configs
