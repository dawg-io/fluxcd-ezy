---
apiVersion: v1
kind: Namespace
metadata:
  name: mealie
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: hay-kot
  namespace: flux-system
spec:
  interval: 24h
  url: https://hay-kot.github.io/helm-charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
  namespace: mealie
spec:
  interval: 30m
  chart:
    spec:
      chart: mealie
      version: "1.x"
      sourceRef:
        kind: HelmRepository
        name: hay-kot
        namespace: flux-system
      interval: 12h
  values:
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - host: mealie.local.example.com
          paths:
            - path: /
              pathType: Prefix
    # Add your values here
    # See chart documentation for available values
